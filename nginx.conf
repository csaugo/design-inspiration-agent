server {
    listen 80;
    charset utf-8;

    root /usr/share/nginx/html;
    index index.html;

    autoindex on;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    location ~* \.(jpg|jpeg|png|gif|webp|svg|ico)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # Evita revalidação constante do board (que sobrescreve quando pass 2 termina)
    # e impede o usuário de selecionar imagens. Cache de 1h para o documento HTML.
    location ~* board\.html$ {
        add_header Cache-Control "private, max-age=3600";
        try_files $uri =404;
    }

    # Redireciona chamadas da API/SSE para o container Node.js (mcp-server)
    location /mcp/ {
        proxy_pass http://mcp-server:3000/mcp/;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        # Importante para SSE (Server-Sent Events) não cair por timeout
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
