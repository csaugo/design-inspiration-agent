version: "3.8"

networks:
  agent-net:
    driver: bridge

volumes:
  redis_data:
  moodboard_data:

services:
  mcp-server:
    build: ./mcp-server
    container_name: dia-mcp-server
    ports:
      - "${PORT_MCP_SERVER}:3000"
    networks:
      - agent-net
    depends_on:
      redis:
        condition: service_healthy
    env_file: .env
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: dia-redis
    networks:
      - agent-net
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  playwright-service:
    build: ./playwright-service
    container_name: dia-playwright
    networks:
      - agent-net
    volumes:
      - moodboard_data:/app/public
      - ./config:/app/config:ro
    depends_on:
      redis:
        condition: service_healthy
    env_file: .env
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: dia-nginx
    ports:
      - "${PORT_NGINX}:80"
    networks:
      - agent-net
    volumes:
      - moodboard_data:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
